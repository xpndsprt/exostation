<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EXOSTATION</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0e16;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: #d7dbe2; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 40px; z-index: 10;
      display: flex; align-items: center; gap: 1rem; padding: 0 1rem;
      background: rgba(16,20,28,.85); border-bottom: 1px solid #232b3a; backdrop-filter: blur(4px);
      font-size: 13px; user-select: none;
    }
    #topbar .brand { font-weight: 700; letter-spacing: .08em; color: #6ea8ff; }
    #topbar .hint { color: #6b7488; margin-left: auto; }
    #palette {
      position: fixed; left: 12px; top: 52px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px;
      background: rgba(16,20,28,.85); border: 1px solid #232b3a; border-radius: 10px; padding: 8px;
    }
    #palette button {
      background: #1c2230; color: #d7dbe2; border: 1px solid #2c3445; border-radius: 7px;
      padding: 8px 14px; font-size: 13px; cursor: pointer; text-align: left; min-width: 92px;
    }
    #palette button:hover { background: #232c3d; }
    #palette button.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
    #palette .group { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
      color: #6b7488; margin: 6px 2px 0; }
    #legend { margin-top: 8px; font-size: 11px; color: #8b93a6; line-height: 1.6; }
    #legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    #power { font-variant-numeric: tabular-nums; color: #c3cbdc; }
    #timectl { display: inline-flex; gap: 4px; }
    #timectl .tbtn { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; line-height: 1; }
    #timectl .tbtn:hover { background: #232c3d; }
    #timectl .tbtn.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
    #savectl { display: inline-flex; gap: 4px; }
    #savectl .tbtn { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; line-height: 1; }
    #savectl .tbtn:hover { background: #232c3d; }
    #savectl .tbtn:disabled { opacity: .4; cursor: default; }
    #infopanel { position: fixed; right: 12px; top: 52px; z-index: 10; width: 210px;
      background: rgba(16,20,28,.9); border: 1px solid #232b3a; border-radius: 10px;
      padding: 12px 14px; font-size: 12.5px; line-height: 1.55; display: none; }
    #infopanel.show { display: block; }
    #infopanel h3 { margin: 0 0 6px; font-size: 13px; color: #6ea8ff; }
    #infopanel .row { display: flex; justify-content: space-between; color: #aab2c4; }
    #infopanel .row b { color: #e3e7ef; font-weight: 600; }
    #infopanel .bar { height: 6px; border-radius: 3px; background: #2a3142; margin: 2px 0 5px; overflow: hidden; }
    #infopanel .bar > i { display: block; height: 100%; }
    #alerts { position: fixed; left: 12px; bottom: 12px; z-index: 20;
      display: flex; flex-direction: column-reverse; gap: 6px; pointer-events: none; }
    #alerts .toast { background: rgba(20,26,36,.95); border: 1px solid #2c3445;
      border-left: 3px solid #2d6cdf; border-radius: 6px; padding: 7px 12px; font-size: 12.5px;
      color: #d7dbe2; max-width: 320px; animation: toastfade 5s forwards; }
    #alerts .toast.warn { border-left-color: #e8a33d; }
    #alerts .toast.bad { border-left-color: #e24b4b; }
    @keyframes toastfade { 0%{opacity:0; transform:translateY(6px);} 8%{opacity:1; transform:none;}
      80%{opacity:1;} 100%{opacity:0;} }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="topbar">
    <span class="brand">EXOSTATION</span>
    <span id="status">grid ready</span>
    <span class="hint">left-drag: build · right-drag: pan · wheel: zoom</span>
  </div>
  <div id="palette"></div>
  <div id="infopanel"></div>
  <div id="alerts"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
