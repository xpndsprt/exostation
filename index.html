<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EXOSTATION</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0e16;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: #d7dbe2; }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 40px; z-index: 10;
      display: flex; align-items: center; gap: 1rem; padding: 0 1rem;
      background: rgba(16,20,28,.85); border-bottom: 1px solid #232b3a; backdrop-filter: blur(4px);
      font-size: 13px; user-select: none;
    }
    #topbar .brand { font-weight: 700; letter-spacing: .08em; color: #6ea8ff; }
    #topbar .hint { color: #6b7488; margin-left: auto; }
    /* objective indicator */
    #objective { display: inline-flex; align-items: center; gap: 7px; color: #c3cbdc;
      background: rgba(28,34,48,.7); border: 1px solid #2c3445; border-radius: 7px; padding: 3px 9px; }
    #objective .goal { font-weight: 600; color: #e3e7ef; }
    #objective .ob { width: 70px; height: 6px; border-radius: 3px; background: #2a3142; overflow: hidden; }
    #objective .ob > i { display: block; height: 100%; background: #6ea8ff; }
    #objective .num { font-variant-numeric: tabular-nums; color: #aab2c4; }
    #objective.done .goal { color: #49d17a; }
    /* victory / defeat banner */
    #endbanner { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
      background: rgba(6,9,14,.72); backdrop-filter: blur(3px); }
    #endbanner.show { display: flex; }
    #endbanner .card { background: #141a24; border: 1px solid #2c3445; border-radius: 14px; padding: 28px 34px;
      text-align: center; max-width: 420px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
    #endbanner .title { font-size: 28px; font-weight: 800; letter-spacing: .04em; margin-bottom: 6px; }
    #endbanner.win .title { color: #5fdc8c; }
    #endbanner.lose .title { color: #ff6a6a; }
    #endbanner .sub { color: #aab2c4; font-size: 14px; line-height: 1.5; margin-bottom: 18px; }
    #endbanner button { background: #2d6cdf; color: #fff; border: none; border-radius: 8px;
      padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #endbanner button:hover { background: #3a78ec; }
    #palette {
      position: fixed; left: 12px; top: 52px; z-index: 10; width: 188px;
      max-height: calc(100vh - 64px); overflow-y: auto;
      display: flex; flex-direction: column;
      background: rgba(16,20,28,.85); border: 1px solid #232b3a; border-radius: 10px; padding: 8px;
    }
    #palette .pal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
    #palette button {
      background: #1c2230; color: #d7dbe2; border: 1px solid #2c3445; border-radius: 6px;
      padding: 4px 7px; font-size: 12px; cursor: pointer; text-align: left; min-width: 0; overflow: hidden;
    }
    #palette button:hover { background: #232c3d; }
    #palette button.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
    #palette button .nm { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #palette button.locked .nm { color: #7a8296; letter-spacing: 2px; }
    #palette button.revealed { animation: reveal 1.05s ease-out; }
    @keyframes reveal {
      0% { background: #2d6cdf; border-color: #6ea8ff; box-shadow: 0 0 14px #2d6cdf; }
      100% { background: #1c2230; border-color: #2c3445; box-shadow: none; }
    }
    #palette .group { font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase;
      color: #6b7488; margin: 7px 2px 3px; }
    #palette .group:first-child { margin-top: 0; }
    #legend { margin-top: 8px; font-size: 11px; color: #8b93a6; line-height: 1.6; }
    #legend .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    #power { font-variant-numeric: tabular-nums; color: #c3cbdc; }
    #timectl { display: inline-flex; gap: 4px; }
    #timectl .tbtn { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; line-height: 1; }
    #timectl .tbtn:hover { background: #232c3d; }
    #timectl .tbtn.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
    #savectl { display: inline-flex; gap: 4px; }
    #savectl .tbtn { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 9px; font-size: 12px; cursor: pointer; line-height: 1; }
    #savectl .tbtn:hover { background: #232c3d; }
    #savectl .tbtn:disabled { opacity: .4; cursor: default; }
    #infopanel { position: fixed; right: 12px; top: 52px; z-index: 10; width: 210px;
      background: rgba(16,20,28,.9); border: 1px solid #232b3a; border-radius: 10px;
      padding: 12px 14px; font-size: 12.5px; line-height: 1.55; display: none; }
    #infopanel.show { display: block; }
    #infopanel h3 { margin: 0 0 6px; font-size: 13px; color: #6ea8ff; }
    #infopanel .row { display: flex; justify-content: space-between; color: #aab2c4; }
    #infopanel .row b { color: #e3e7ef; font-weight: 600; }
    #infopanel .bar { height: 6px; border-radius: 3px; background: #2a3142; margin: 2px 0 5px; overflow: hidden; }
    #infopanel .bar > i { display: block; height: 100%; }
    #alerts { position: fixed; left: 12px; bottom: 12px; z-index: 20;
      display: flex; flex-direction: column-reverse; gap: 6px; pointer-events: none; }
    #alerts .toast { background: rgba(20,26,36,.95); border: 1px solid #2c3445;
      border-left: 3px solid #2d6cdf; border-radius: 6px; padding: 7px 12px; font-size: 12.5px;
      color: #d7dbe2; max-width: 320px; animation: toastfade 5s forwards; }
    #alerts .toast.warn { border-left-color: #e8a33d; }
    #alerts .toast.bad { border-left-color: #e24b4b; }
    #alerts .toast.clickable { pointer-events: auto; cursor: pointer; }
    @keyframes toastfade { 0%{opacity:0; transform:translateY(6px);} 8%{opacity:1; transform:none;}
      80%{opacity:1;} 100%{opacity:0;} }
    /* HUD chips */
    #status { display: inline-flex; gap: 10px; align-items: center; }
    .chip { display: inline-flex; align-items: center; gap: 5px; color: #c3cbdc;
      font-variant-numeric: tabular-nums; white-space: nowrap; }
    .chip .ic { opacity: .8; }
    .chip.bad b { color: #ff6a6a; }
    .pbar { width: 46px; height: 7px; border-radius: 4px; background: #2a3142; overflow: hidden; display: inline-block; vertical-align: middle; }
    .pbar > i { display: block; height: 100%; background: #49d17a; }
    /* palette hotkey badge */
    #palette button .hk { display: block; opacity: .45; font-size: 9px; margin-top: 1px; }
    /* overlay toggle */
    #overlayctl { display: inline-flex; gap: 4px; }
    #overlayctl .tbtn { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 8px; font-size: 11px; cursor: pointer; line-height: 1; }
    #overlayctl .tbtn.active { background: #2d6cdf; border-color: #2d6cdf; color: #fff; }
    /* info-panel action buttons */
    #infopanel .actions { display: flex; gap: 6px; margin-top: 8px; }
    #infopanel .actions button { flex: 1; background: #1c2230; color: #d7dbe2; border: 1px solid #2c3445;
      border-radius: 6px; padding: 5px; font-size: 11.5px; cursor: pointer; }
    #infopanel .actions button:hover { background: #232c3d; }
    #infopanel .actions button.danger:hover { background: #5a2330; border-color: #8a3548; }
    /* floating hover tooltip */
    #tooltip { position: fixed; z-index: 30; pointer-events: none; display: none;
      background: rgba(20,26,36,.96); border: 1px solid #2c3445; border-radius: 7px;
      padding: 7px 10px; font-size: 12px; line-height: 1.5; color: #d7dbe2; max-width: 220px; }
    #tooltip.show { display: block; }
    #tooltip h4 { margin: 0 0 3px; font-size: 12.5px; color: #6ea8ff; }
    #tooltip .muted { color: #8b93a6; }
    /* brownout banner */
    #banner { position: fixed; top: 48px; left: 50%; transform: translateX(-50%); z-index: 15;
      display: none; background: rgba(80,30,30,.92); border: 1px solid #8a3548; color: #ffd0d0;
      padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }
    #banner.show { display: block; }
    /* speed / paused watermark (top-right, under the bar) */
    #watermark { position: fixed; right: 14px; top: 48px; z-index: 5; color: #6b7488;
      font-size: 13px; font-weight: 700; letter-spacing: .06em; pointer-events: none; }
    /* lower-right column: Alienpedia stacked above the Advisor */
    #rightcol { position: fixed; right: 12px; bottom: 12px; z-index: 12; width: 244px;
      display: flex; flex-direction: column; gap: 8px; }
    #tech, #requests, #alienpedia, #advisor { background: rgba(16,20,28,.93); border: 1px solid #232b3a;
      border-radius: 10px; padding: 10px 12px; font-size: 12px; backdrop-filter: blur(4px); }
    /* collapsible panels: click the header to fold/unfold */
    .panel > h3 { cursor: pointer; user-select: none; }
    .panel > h3::before { content: "▾"; display: inline-block; width: 12px; opacity: .55; font-size: 10px; }
    .panel.collapsed > h3::before { content: "▸"; }
    .panel.collapsed > h3 { margin-bottom: 0; }
    .panel.collapsed > *:not(h3) { display: none; }
    #tech { max-height: 42vh; overflow-y: auto; }
    #tech h3 { margin: 0 0 7px; font-size: 12px; color: #b39cff; letter-spacing: .06em; }
    #tech .unlock { padding: 6px 0; border-top: 1px solid #232b3a; }
    #tech .unlock:first-of-type { border-top: none; }
    #tech .ul-h { display: flex; justify-content: space-between; align-items: baseline; }
    #tech .ul-h .goal { font-weight: 600; color: #e3e7ef; }
    #tech .ul-h .num { color: #aab2c4; font-variant-numeric: tabular-nums; }
    #tech .ul-d { color: #8b93a6; font-size: 11px; line-height: 1.4; margin: 2px 0 5px; }
    #tech button { width: 100%; background: #2d2a55; color: #cdb6ee; border: 1px solid #4a3f7a;
      border-radius: 6px; padding: 5px; font-size: 11.5px; cursor: pointer; }
    #tech button:hover { background: #3a3570; }
    #tech button.cant { opacity: .5; }
    /* locked palette tools */
    #palette button.locked { opacity: .8; cursor: help; border-style: dashed; }
    #requests h3 { margin: 0 0 7px; font-size: 12px; color: #e8c349; letter-spacing: .06em; }
    #requests .req { display: flex; flex-direction: column; gap: 2px; padding: 5px 0; border-top: 1px solid #232b3a; }
    #requests .req:first-of-type { border-top: none; }
    #requests .req .txt { color: #d7dbe2; }
    #requests .req .meta { color: #8b93a6; font-size: 11px; }
    #requests .tbar { height: 3px; border-radius: 2px; background: #2a3142; overflow: hidden; margin-top: 2px; }
    #requests .tbar > i { display: block; height: 100%; background: #e8c349; }
    #requests .empty { color: #6b7488; }
    #alienpedia .rep { height: 4px; border-radius: 2px; background: #2a3142; overflow: hidden; margin: 3px 0 2px; }
    #alienpedia .rep > i { display: block; height: 100%; background: #6ea8ff; }
    #alienpedia .ped-list { max-height: 32vh; overflow-y: auto; }
    #alienpedia h3, #advisor h3 { margin: 0 0 7px; font-size: 12px; color: #6ea8ff;
      letter-spacing: .06em; display: flex; align-items: center; gap: 6px; }
    #alienpedia .ent { border-top: 1px solid #232b3a; padding: 7px 0; }
    #alienpedia .ent:first-of-type { border-top: none; padding-top: 0; }
    #alienpedia .hd { display: flex; align-items: center; gap: 6px; font-weight: 600; color: #e3e7ef; }
    #alienpedia .hd .d { width: 9px; height: 9px; border-radius: 50%; }
    #alienpedia .hd .role { margin-left: auto; font-weight: 400; font-size: 10.5px; color: #8b93a6; }
    #alienpedia .stat { color: #aab2c4; margin-top: 2px; }
    #alienpedia .stat b { color: #cdd4e2; font-weight: 600; }
    #alienpedia .blurb { color: #8b93a6; margin-top: 3px; font-size: 11px; line-height: 1.45; }
    #alienpedia .empty { color: #6b7488; }
    #advisor h3 { margin: 0 0 7px; font-size: 12px; color: #6ea8ff; letter-spacing: .06em;
      display: flex; align-items: center; gap: 6px; }
    #advisor .seen { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    #advisor .seen .muted { color: #6b7488; }
    #advisor .sp { display: inline-flex; align-items: center; gap: 5px; background: #1c2230;
      border: 1px solid #2c3445; border-radius: 11px; padding: 2px 8px; font-size: 11px; }
    #advisor .sp .d { width: 8px; height: 8px; border-radius: 50%; }
    #advisor .advice { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
    #advisor .advice li { display: flex; gap: 7px; line-height: 1.4; align-items: stretch; }
    #advisor .advice li .mk { flex: none; width: 4px; border-radius: 2px; background: #6b7488; }
    #advisor .advice li.critical .mk { background: #e24b4b; }
    #advisor .advice li.warn .mk { background: #e8a33d; }
    #advisor .advice li.tip .mk { background: #49d17a; }
    #advisor .advice li.critical span:last-child { color: #ffb4b4; }
    /* drag size label */
    #draglabel { position: fixed; z-index: 30; pointer-events: none; display: none;
      background: rgba(20,26,36,.96); border: 1px solid #2c3445; border-radius: 6px;
      padding: 3px 8px; font-size: 12px; color: #d7dbe2; font-variant-numeric: tabular-nums; }
    #draglabel.show { display: block; }
    /* Alienpedia: clickable entries */
    #alienpedia .ent.locatable { cursor: pointer; border-radius: 6px; }
    #alienpedia .ent.locatable:hover { background: rgba(110,168,255,.08); }
    /* guided opening overlay */
    #tutorial { position: fixed; left: 50%; top: 48px; transform: translateX(-50%); z-index: 14;
      display: none; width: 320px; background: rgba(16,20,28,.95); border: 1px solid #2c3445;
      border-radius: 10px; padding: 10px 14px; font-size: 12.5px; box-shadow: 0 8px 28px rgba(0,0,0,.4); }
    #tutorial.show { display: block; }
    #tutorial h3 { margin: 0 0 6px; font-size: 12px; color: #6ea8ff; letter-spacing: .06em; }
    #tutorial ol { list-style: none; margin: 0 0 6px; padding: 0; display: flex; flex-direction: column; gap: 3px; }
    #tutorial li { color: #aab2c4; }
    #tutorial li.done { color: #6fdc97; }
    #tutorial .tut-foot { display: flex; align-items: center; gap: 8px; justify-content: space-between;
      color: #8b93a6; font-size: 11px; border-top: 1px solid #232b3a; padding-top: 6px; }
    #tutorial .tut-foot button { background: #1c2230; color: #c3cbdc; border: 1px solid #2c3445;
      border-radius: 6px; padding: 3px 10px; font-size: 11px; cursor: pointer; }
    #tutorial .tut-foot button:hover { background: #232c3d; }
    /* saves modal */
    #saves { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
      background: rgba(6,9,14,.6); backdrop-filter: blur(3px); }
    #saves.show { display: flex; }
    #saves .card { background: #141a24; border: 1px solid #2c3445; border-radius: 14px; padding: 20px 22px;
      width: 360px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
    #saves h3 { margin: 0 0 12px; font-size: 14px; color: #6ea8ff; letter-spacing: .04em; }
    #saves .slot { border: 1px solid #232b3a; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    #saves .slot-h { display: flex; justify-content: space-between; align-items: baseline; }
    #saves .slot-h b { color: #e3e7ef; }
    #saves .slot-sum { color: #aab2c4; font-size: 11.5px; margin: 2px 0 6px; }
    #saves .slot-btns { display: flex; gap: 6px; }
    #saves .slot-btns button { flex: 1; background: #1c2230; color: #d7dbe2; border: 1px solid #2c3445;
      border-radius: 6px; padding: 5px; font-size: 11.5px; cursor: pointer; }
    #saves .slot-btns button:hover:not(:disabled) { background: #232c3d; }
    #saves .slot-btns button:disabled { opacity: .35; cursor: default; }
    #saves .slot-btns button.danger:hover:not(:disabled) { background: #5a2330; border-color: #8a3548; }
    #saves .muted { color: #6b7488; }
    #saves .close { margin-top: 4px; width: 100%; background: #2d6cdf; color: #fff; border: none;
      border-radius: 8px; padding: 8px; font-size: 13px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="topbar">
    <span class="brand">EXOSTATION</span>
    <span id="status">grid ready</span>
    <span id="objective"></span>
    <span class="hint">left-drag: build · right-drag: pan · wheel: zoom</span>
  </div>
  <div id="palette"></div>
  <div id="infopanel"></div>
  <div id="alerts"></div>
  <div id="tooltip"></div>
  <div id="draglabel"></div>
  <div id="banner">⚠ BROWNOUT — shedding power</div>
  <div id="tutorial"></div>
  <div id="saves"><div class="card">
    <h3>💾 Saves</h3>
    <div id="saves-body"></div>
    <button class="close" type="button" onclick="document.getElementById('saves').classList.remove('show')">Close</button>
  </div></div>
  <div id="endbanner"><div class="card">
    <div class="title"></div>
    <div class="sub"></div>
    <button type="button">New station</button>
  </div></div>
  <div id="watermark"></div>
  <div id="rightcol">
    <div id="tech" class="panel"></div>
    <div id="requests" class="panel"></div>
    <div id="alienpedia" class="panel"></div>
    <div id="advisor" class="panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
